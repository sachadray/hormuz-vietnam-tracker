    async function storageGet(key) {
      try {
        const raw = localStorage.getItem(key);
        if (raw === null) return null;
        return { value: raw };
      } catch { return null; }
    }
    async function storageSet(key, value) {
      try { localStorage.setItem(key, value); return { key, value }; }
      catch { return null; }

function stat(v, g, a) { return v == null ? "grey" : v < g ? "green" : v < a ? "amber" : "red"; }
function statInv(v, g, a) { return v == null ? "grey" : v > g ? "green" : v > a ? "amber" : "red"; }

// Dynamic Y-axis domain: computes [min, max] with padding from data
function autoDomain(arr, keys, pad = 0.15, refLines = []) {
  let vals = [];
  const ks = Array.isArray(keys) ? keys : [keys];
  for (const row of arr) for (const k of ks) { const v = Number(row[k]); if (!isNaN(v)) vals.push(v); }
  for (const r of refLines) vals.push(r);
  if (!vals.length) return [0, 100];
  let lo = Math.min(...vals), hi = Math.max(...vals);
  const range = hi - lo || Math.abs(hi) * 0.2 || 10;
  lo = Math.floor((lo - range * pad) * 100) / 100;
  hi = Math.ceil((hi + range * pad) * 100) / 100;
  return [lo, hi];
}

function Tile({ label, display, status }) {
  return <div style={{ background: sBg[status], borderRadius: 6, padding: "8px 12px", minWidth: 110, flex: "1 1 110px" }}>
    <div style={{ fontSize: 10, fontWeight: 600, color: sFg[status], textTransform: "uppercase", letterSpacing: .5 }}>{label}</div>
    <div style={{ fontSize: 18, fontWeight: 700, color: sFg[status], marginTop: 2 }}>{display}</div>
  </div>;
}

function Tip({ active, payload, label, pre = "", suf = "" }) {
  if (!active || !payload?.length) return null;
  return <div style={{ background: "#fff", border: `1px solid ${C.bdr}`, borderRadius: 6, padding: "8px 12px", fontSize: 12, boxShadow: "0 2px 8px rgba(0,0,0,.08)" }}>
    <div style={{ fontWeight: 600, marginBottom: 4 }}>{label}</div>
    {payload.map((p, i) => <div key={i} style={{ color: p.color || C.pri }}>{p.name}: {pre}{typeof p.value === "number" ? p.value.toLocaleString() : p.value}{suf}</div>)}
  </div>;
}

// ─── EDITABLE TABLE COMPONENT ──────────────────────────────────────────────

function EditableTable({ data, columns, onChange, label }) {
  const [expanded, setExpanded] = useState(false);
  const inputStyle = { width: "100%", padding: "4px 6px", border: `1px solid ${C.bdr}`, borderRadius: 3, fontSize: 12 };

  return (
    <div style={{ marginBottom: 16 }}>
      <button onClick={() => setExpanded(!expanded)} style={{
        background: "none", border: "none", cursor: "pointer", fontSize: 13, fontWeight: 600,
        color: C.pri, padding: 0, display: "flex", alignItems: "center", gap: 4, marginBottom: 6,
      }}>
        <span style={{ transform: expanded ? "rotate(90deg)" : "rotate(0)", transition: "0.15s", display: "inline-block" }}>▶</span>
        {label} ({data.length} rows)
      </button>
      {expanded && (
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", fontSize: 12, borderCollapse: "collapse", minWidth: columns.length * 100 }}>
            <thead>
              <tr>{columns.map(c => <th key={c} style={{ textAlign: "left", padding: "4px 6px", fontSize: 10, fontWeight: 600, color: C.mut, textTransform: "uppercase", borderBottom: `1px solid ${C.bdr}` }}>{c}</th>)}</tr>
            </thead>
            <tbody>
              {data.map((row, ri) => (
                <tr key={ri} style={{ borderBottom: `1px solid ${C.bdr}` }}>
                  {columns.map(c => (
                    <td key={c} style={{ padding: "3px 4px" }}>
                      <input style={inputStyle} value={row[c] ?? ""}
                        onChange={e => {
                          const newArr = [...data];
                          const v = e.target.value;
                          newArr[ri] = { ...newArr[ri], [c]: isNaN(Number(v)) || v === "" ? v : Number(v) };
                          onChange(newArr);
                        }} />
                    </td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{ marginTop: 6, display: "flex", gap: 6 }}>
            <button onClick={() => {
              const newRow = {};
              columns.forEach(c => { newRow[c] = ""; });
              onChange([...data, newRow]);
            }} style={{ fontSize: 11, color: C.pri, background: "none", border: `1px solid ${C.pri}`, borderRadius: 4, padding: "3px 10px", cursor: "pointer" }}>+ Add Row</button>
            {data.length > 1 && <button onClick={() => onChange(data.slice(0, -1))} style={{ fontSize: 11, color: C.red, background: "none", border: `1px solid ${C.red}`, borderRadius: 4, padding: "3px 10px", cursor: "pointer" }}>− Remove Last</button>}
          </div>
        </div>
      )}
    </div>
  );
}

      exportRef.current.setSelectionRange(0, 999999);
      document.execCommand("copy");
      setCopyMsg("Copied to clipboard");
    } catch {
      setCopyMsg("Select all text manually (Ctrl+A) and copy");
    }
  }

  function handleImportFromText() {
    if (!importJson.trim()) { setUploadStatus("Error: Paste JSON data first"); return; }
    try {
      const parsed = JSON.parse(importJson);
      if (!parsed.indicators || !parsed.baseline) throw new Error("Invalid format — missing indicators or baseline");
      delete parsed._meta;
      setData(parsed);
      setEditData(JSON.parse(JSON.stringify(parsed)));
      setImportJson("");
      setUploadStatus(`Imported successfully at ${new Date().toLocaleTimeString()}`);
    } catch (err) {
      setUploadStatus(`Error: ${err.message}`);
    }
  }

  function handleUploadFile(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    setUploadStatus("Reading file...");
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const text = ev.target.result;
        const parsed = JSON.parse(text);
        if (!parsed.indicators || !parsed.baseline) throw new Error("Invalid format — missing indicators or baseline");
        delete parsed._meta;
        setData(parsed);
        setEditData(JSON.parse(JSON.stringify(parsed)));
        setUploadStatus(`File imported at ${new Date().toLocaleTimeString()} — all data refreshed.`);
      } catch (err) {
        setUploadStatus(`Error: ${err.message}`);
      }
    };
    reader.onerror = () => setUploadStatus("Error: Could not read file");
    reader.readAsText(file);
    e.target.value = "";
  }

  // Indicator field defs for admin
  const indFields = [
    { k: "brent", l: "Brent (USD/bbl)" }, { k: "wti", l: "WTI (USD/bbl)" },
    { k: "ttf", l: "TTF Gas (USD/MWh)" }, { k: "usGasoline", l: "US Gas (USD/gal)" },
    { k: "hormuzTransits", l: "Hormuz Transits/day" }, { k: "severityScore", l: "Severity (0-10)" },
    { k: "ron95", l: "RON95 (VND/L)" }, { k: "diesel", l: "Diesel (VND/L)" },
    { k: "ron95Base", l: "RON95 Base (no subsidy)" }, { k: "dieselBase", l: "Diesel Base (no subsidy)" },
    { k: "usdvnd", l: "USD/VND (official)" }, { k: "usdvndFreeMarket", l: "USD/VND (free mkt)" },
    { k: "vnindex", l: "VN-Index" }, { k: "cpiFeb", l: "CPI Feb (% y/y)" },
    { k: "cpiJan", l: "CPI Jan (% y/y)" }, { k: "cpiDec", l: "CPI Dec (% y/y)" },
    { k: "vix", l: "VIX" }, { k: "gold", l: "Gold (USD/oz)" },
    { k: "fxReserves", l: "FX Reserves (USD bn)" }, { k: "oilReserve", l: "SPR (days)" },
  ];

  const baseFields = [
    { k: "brent", l: "Brent" }, { k: "wti", l: "WTI" }, { k: "ttf", l: "TTF" },
    { k: "usGasoline", l: "US Gas" }, { k: "hormuzTransits", l: "Transits" },
    { k: "ron95", l: "RON95" }, { k: "diesel", l: "Diesel" },
    { k: "usdvnd", l: "USD/VND" }, { k: "vnindex", l: "VN-Index" },
  ];

  const btnStyle = (active) => ({
    padding: "6px 14px", fontSize: 12, fontWeight: active ? 700 : 500,
    color: active ? "#fff" : C.mut, background: active ? C.pri : "transparent",
    border: `1px solid ${active ? C.pri : C.bdr}`, borderRadius: 4, cursor: "pointer",
  });

  // ─── RENDER ────────────────────────────────────────────────────────────────
  return (
    <div style={{ fontFamily: "'DM Sans','Segoe UI',system-ui,sans-serif", background: "#fff", color: C.text, minHeight: "100vh" }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

      <div style={{ padding: "20px 24px 0", maxWidth: 1200, margin: "0 auto" }}>
        {/* HEADER */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12 }}>
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: C.red, textTransform: "uppercase", letterSpacing: 1.5 }}>● LIVE MONITORING</div>
            <h1 style={{ fontSize: 22, fontWeight: 700, margin: "4px 0 0", lineHeight: 1.2 }}>Hormuz Crisis — Vietnam Impact Tracker</h1>
            <div style={{ fontSize: 12, color: C.mut, marginTop: 2 }}>
              Day {data.transitData.length} · {d.lastUpdate}
              {isLive && <span style={{ color: C.grn, marginLeft: 8 }}>● Oil prices live</span>}
            </div>
          </div>
          <button onClick={() => { setAdminOpen(!adminOpen); if (!adminOpen && !editData && authed) setEditData(JSON.parse(JSON.stringify(data))); }}
            style={{ background: adminOpen ? C.pri : "none", color: adminOpen ? "#fff" : C.mut, border: `1px solid ${adminOpen ? C.pri : C.bdr}`, borderRadius: 6, padding: "6px 12px", cursor: "pointer", fontSize: 12 }}>
            ⚙ Admin
          </button>
        </div>

        {/* ═══ ADMIN PANEL ═══ */}
        {adminOpen && (
          <div style={{ margin: "16px 0", padding: 20, background: "#F8FAFC", borderRadius: 8, border: `1px solid ${C.bdr}` }}>
            {!authed ? (
              <div>
                <div style={{ fontWeight: 600, marginBottom: 8 }}>Admin Authentication</div>
                <div style={{ display: "flex", gap: 8 }}>
                  <input type="password" placeholder="Enter password" value={pw}
                    onChange={e => { setPw(e.target.value); setPwError(false); }}
                    onKeyDown={e => { if (e.key === "Enter") handleLogin(); }}
                    style={{ padding: "7px 12px", border: `1px solid ${pwError ? C.red : C.bdr}`, borderRadius: 4, fontSize: 13, width: 220 }} />
                  <button onClick={handleLogin} style={{ padding: "7px 16px", background: C.pri, color: "#fff", border: "none", borderRadius: 4, cursor: "pointer", fontSize: 13 }}>Login</button>
                </div>
                {pwError && <div style={{ fontSize: 12, color: C.red, marginTop: 6 }}>Incorrect password</div>}
              </div>
            ) : (
              <div>
                {/* Admin sub-tabs */}
                <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" }}>
                  {adminTabs.map((t, i) => <button key={i} onClick={() => setAdminTab(i)} style={btnStyle(adminTab === i)}>{t}</button>)}
                </div>

                {/* TAB 0: INDICATORS */}
                {adminTab === 0 && editData && (
                  <div>
                    <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 10 }}>Current Indicators</div>
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(190px, 1fr))", gap: 10 }}>
                      {indFields.map(f => (
                        <div key={f.k}>
                          <label style={{ fontSize: 11, color: C.mut, display: "block", marginBottom: 2 }}>{f.l}</label>
                          <input type="number" value={editData.indicators[f.k]} onChange={e => setEditData(p => ({ ...p, indicators: { ...p.indicators, [f.k]: +e.target.value } }))}
                            style={{ width: "100%", padding: "6px 8px", border: `1px solid ${C.bdr}`, borderRadius: 4, fontSize: 13 }} />
                        </div>
                      ))}
                    </div>
                    <div style={{ fontWeight: 600, fontSize: 14, marginTop: 20, marginBottom: 10 }}>Pre-Crisis Baseline</div>
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(160px, 1fr))", gap: 10 }}>
                      {baseFields.map(f => (
                        <div key={f.k}>
                          <label style={{ fontSize: 11, color: C.mut, display: "block", marginBottom: 2 }}>{f.l}</label>
                          <input type="number" value={editData.baseline[f.k]} onChange={e => setEditData(p => ({ ...p, baseline: { ...p.baseline, [f.k]: +e.target.value } }))}
                            style={{ width: "100%", padding: "6px 8px", border: `1px solid ${C.bdr}`, borderRadius: 4, fontSize: 13 }} />
                        </div>
                      ))}
                    </div>
                    <button onClick={handleSaveAll} style={{ marginTop: 16, padding: "8px 24px", background: C.pri, color: "#fff", border: "none", borderRadius: 4, cursor: "pointer", fontSize: 13, fontWeight: 600 }}>
                      Save Indicators
                    </button>
                  </div>
                )}

                {/* TAB 1: TIME SERIES */}
                {adminTab === 1 && editData && (
                  <div>
                    <div style={{ fontSize: 13, color: C.mut, marginBottom: 12 }}>Click a section to expand and edit individual data points. Add/remove rows as needed.</div>

                      onChange={v => setEditData(p => ({ ...p, transitData: v }))} />
                    <EditableTable label="Brent/WTI Price Series" data={editData.brentSeries} columns={["date", "brent", "wti"]}
                      onChange={v => setEditData(p => ({ ...p, brentSeries: v }))} />
                    <EditableTable label="Vietnam Fuel Prices" data={editData.vnFuel} columns={["date", "ron95", "diesel"]}
                      onChange={v => setEditData(p => ({ ...p, vnFuel: v }))} />
                    <EditableTable label="USD/VND" data={editData.vnUsdvnd} columns={["date", "value", "free"]}
                      onChange={v => setEditData(p => ({ ...p, vnUsdvnd: v }))} />
                    <EditableTable label="VN-Index" data={editData.vnIndex} columns={["date", "value"]}
                      onChange={v => setEditData(p => ({ ...p, vnIndex: v }))} />
                    <EditableTable label="Vietnam CPI" data={editData.vnCpi} columns={["month", "value"]}
                      onChange={v => setEditData(p => ({ ...p, vnCpi: v }))} />
                    <EditableTable label="FX Reserves" data={editData.vnFxReserves} columns={["quarter", "value"]}
                      onChange={v => setEditData(p => ({ ...p, vnFxReserves: v }))} />
                    <EditableTable label="Oil Dependency" data={editData.oilDependency} columns={["country", "pct"]}
                      onChange={v => setEditData(p => ({ ...p, oilDependency: v }))} />
                    <EditableTable label="Strategic Reserves" data={editData.sprData} columns={["name", "days"]}
                      onChange={v => setEditData(p => ({ ...p, sprData: v }))} />
                    <EditableTable label="Severity Sub-Scores" data={editData.severitySub} columns={["name", "score"]}
                      onChange={v => setEditData(p => ({ ...p, severitySub: v }))} />
                    <EditableTable label="VIX Series" data={editData.gmVix} columns={["date", "value"]}
                      onChange={v => setEditData(p => ({ ...p, gmVix: v }))} />
                    <EditableTable label="Gold Series" data={editData.gmGold} columns={["date", "value"]}
                      onChange={v => setEditData(p => ({ ...p, gmGold: v }))} />
                    <EditableTable label="Natural Gas Series" data={editData.gmGas} columns={["date", "value"]}
                      onChange={v => setEditData(p => ({ ...p, gmGas: v }))} />
                    <EditableTable label="Supply Chain (GSCPI)" data={editData.gmGscpi} columns={["date", "value"]}
                      onChange={v => setEditData(p => ({ ...p, gmGscpi: v }))} />
                    <EditableTable label="Carrier Status" data={editData.carriers} columns={["name", "status", "trapped", "surcharge"]}
                      onChange={v => setEditData(p => ({ ...p, carriers: v }))} />
                    <EditableTable label="Crisis Timeline" data={editData.timeline} columns={["date", "event"]}
                      onChange={v => setEditData(p => ({ ...p, timeline: v }))} />
                    <button onClick={handleSaveAll} style={{ marginTop: 8, padding: "8px 24px", background: C.pri, color: "#fff", border: "none", borderRadius: 4, cursor: "pointer", fontSize: 13, fontWeight: 600 }}>
                      Save All Series
                    </button>
                  </div>
                )}

                {/* TAB 2: SITUATION REPORT */}
                {adminTab === 2 && editData && (
                  <div>
                    <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 10 }}>Situation Report</div>
                    <textarea value={editData.sitRep.text} onChange={e => setEditData(p => ({ ...p, sitRep: { ...p.sitRep, text: e.target.value } }))}
                      rows={5} style={{ width: "100%", padding: 10, border: `1px solid ${C.bdr}`, borderRadius: 4, fontSize: 13, resize: "vertical", lineHeight: 1.6 }} />
                    <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                      <input placeholder="Analyst" value={editData.sitRep.analyst}
                        onChange={e => setEditData(p => ({ ...p, sitRep: { ...p.sitRep, analyst: e.target.value } }))}
                        style={{ flex: 1, padding: "7px 10px", border: `1px solid ${C.bdr}`, borderRadius: 4, fontSize: 13 }} />
                      <input placeholder="Date" value={editData.sitRep.date}
                        onChange={e => setEditData(p => ({ ...p, sitRep: { ...p.sitRep, date: e.target.value } }))}
                        style={{ flex: 1, padding: "7px 10px", border: `1px solid ${C.bdr}`, borderRadius: 4, fontSize: 13 }} />
                    </div>
                    <button onClick={handleSaveAll} style={{ marginTop: 12, padding: "8px 24px", background: "#059669", color: "#fff", border: "none", borderRadius: 4, cursor: "pointer", fontSize: 13, fontWeight: 600 }}>
                      Save Situation Report
                    </button>
                  </div>
                )}

                {/* TAB 3: IMPORT / EXPORT */}
                {adminTab === 3 && (
                  <div>
                    <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 10 }}>Data Export</div>
                    <p style={{ fontSize: 13, color: C.mut, marginBottom: 10, lineHeight: 1.5 }}>
                      Generate a JSON snapshot of all dashboard data. Copy the text, save as a .json file, edit, and re-import.
                    </p>
                    <button onClick={handleExport} style={{ padding: "10px 24px", background: C.pri, color: "#fff", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 13, fontWeight: 600, marginBottom: 12 }}>
                      Generate Data Export
                    </button>

                    {exportJson && (
                      <div style={{ marginTop: 4 }}>
                        <div style={{ display: "flex", gap: 8, marginBottom: 8, flexWrap: "wrap", alignItems: "center" }}>
                          <button onClick={handleCopy} style={{ padding: "8px 20px", background: "#059669", color: "#fff", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 13, fontWeight: 600 }}>
                            Copy to Clipboard
                          </button>
                          <button onClick={() => { setExportJson(""); setCopyMsg(""); }} style={{ padding: "8px 14px", background: "none", color: C.mut, border: `1px solid ${C.bdr}`, borderRadius: 6, cursor: "pointer", fontSize: 12 }}>
                            Close
                          </button>
                          {copyMsg && <span style={{ fontSize: 12, color: "#059669", fontWeight: 600 }}>{copyMsg}</span>}
                        </div>
                        <textarea ref={exportRef} readOnly value={exportJson} rows={16}
                          style={{ width: "100%", padding: 10, border: `1px solid ${C.bdr}`, borderRadius: 6, fontSize: 11, fontFamily: "'SF Mono','Consolas',monospace", resize: "vertical", background: "#F8FAFC", color: C.text, lineHeight: 1.4 }}
                          onFocus={e => e.target.select()} />
                        <div style={{ fontSize: 11, color: C.mut, marginTop: 4 }}>
                          Click inside the text box → Ctrl+A → Ctrl+C if the button doesn't work. Save as a .json file.
                        </div>
                      </div>
                    )}

                    <div style={{ fontWeight: 600, fontSize: 14, marginTop: 28, marginBottom: 10 }}>Data Import</div>
                    <p style={{ fontSize: 13, color: C.mut, marginBottom: 10, lineHeight: 1.5 }}>
                      Paste edited JSON below, or upload a .json file. This replaces the entire dashboard dataset.
                    </p>

                    <div style={{ display: "flex", gap: 8, marginBottom: 10, flexWrap: "wrap", alignItems: "center" }}>
                      <input type="file" accept=".json,.txt" ref={fileInputRef} onChange={handleUploadFile} style={{ display: "none" }} />
                      <button onClick={() => fileInputRef.current?.click()} style={{ padding: "10px 20px", background: "#7C3AED", color: "#fff", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 13, fontWeight: 600 }}>
                        Upload .json File
                      </button>
                      <span style={{ fontSize: 12, color: C.mut, alignSelf: "center" }}>or paste below ↓</span>
                    </div>

                    <textarea value={importJson} onChange={e => setImportJson(e.target.value)} rows={10}
                      placeholder='Paste the exported JSON data here...'
                      style={{ width: "100%", padding: 10, border: `1px solid ${C.bdr}`, borderRadius: 6, fontSize: 11, fontFamily: "'SF Mono','Consolas',monospace", resize: "vertical", background: "#fff", color: C.text, lineHeight: 1.4 }} />
                    <button onClick={handleImportFromText} disabled={!importJson.trim()}
                      style={{ marginTop: 8, padding: "10px 24px", background: importJson.trim() ? "#059669" : C.sec, color: "#fff", border: "none", borderRadius: 6, cursor: importJson.trim() ? "pointer" : "default", fontSize: 13, fontWeight: 600 }}>
                      Import Pasted Data
                    </button>

                    {uploadStatus && (
                      <div style={{ marginTop: 10, padding: "8px 12px", background: uploadStatus.startsWith("Error") ? "#FEE2E2" : uploadStatus.startsWith("Reset") ? "#FEF3C7" : "#DCFCE7", borderRadius: 4, fontSize: 12, color: uploadStatus.startsWith("Error") ? "#991B1B" : uploadStatus.startsWith("Reset") ? "#92400E" : "#166534" }}>
                        {uploadStatus}
                      </div>
                    )}

                    <div style={{ fontWeight: 600, fontSize: 14, marginTop: 28, marginBottom: 10 }}>Reset Data</div>
                    <p style={{ fontSize: 13, color: C.mut, marginBottom: 10, lineHeight: 1.5 }}>
                      Discard all changes and revert every indicator, time series, and the situation report to the built-in defaults.
                    </p>
                    <button onClick={handleResetDefaults} style={{ padding: "10px 20px", background: C.red, color: "#fff", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 13, fontWeight: 600 }}>
                      Reset to Defaults
                    </button>
                    <div style={{ fontSize: 11, color: C.mut, marginTop: 16, padding: "10px 12px", background: "#F0FDF4", borderRadius: 4, border: "1px solid #BBF7D0" }}>
                      All changes are auto-saved and persist across page reloads.
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* SITREP */}
        <div style={{ margin: "16px 0", padding: "14px 18px", background: "#FFFBEB", borderLeft: `3px solid ${C.amb}`, borderRadius: "0 6px 6px 0" }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: "#92400E", textTransform: "uppercase", letterSpacing: .5 }}>Situation Report</div>
          <div style={{ fontSize: 13, color: "#78350F", marginTop: 6, lineHeight: 1.6 }}>{data.sitRep.text}</div>
          <div style={{ fontSize: 11, color: "#A16207", marginTop: 6 }}>— {data.sitRep.analyst} · {data.sitRep.date}</div>
        </div>

        {/* HEAT MAP */}
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, margin: "12px 0 16px" }}>
          {heat.map((h, i) => <Tile key={i} {...h} />)}
        </div>

        {/* TABS */}
        <div style={{ display: "flex", gap: 0, borderBottom: `2px solid ${C.bdr}` }}>
          {tabs.map((t, i) => (
            <button key={i} onClick={() => setTab(i)} style={{
              padding: "10px 20px", fontSize: 13, fontWeight: tab === i ? 700 : 500,
              color: tab === i ? C.pri : C.mut, background: "none", border: "none", cursor: "pointer",
              borderBottom: tab === i ? `2px solid ${C.pri}` : "2px solid transparent", marginBottom: -2,
            }}>{t}</button>
          ))}
        </div>
      </div>

      {/* ─── TAB CONTENT ─── */}
      <div style={{ padding: "20px 24px 40px", maxWidth: 1200, margin: "0 auto" }}>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(min(100%, 480px), 1fr))", gap: 16 }}>

        {tab === 0 && <>
          <Card title="Crisis Severity Score" sub="Composite assessment across five dimensions." src="HormuzTracker.com" date={d.lastUpdate}>
            <div style={{ textAlign: "center", padding: "10px 0" }}>
              <div style={{ fontSize: 56, fontWeight: 700, color: C.red, lineHeight: 1 }}>{d.severityScore}<span style={{ fontSize: 24, color: C.mut }}>/10</span></div>
              <div style={{ display: "flex", justifyContent: "center", gap: 6, marginTop: 14, flexWrap: "wrap" }}>
                {data.severitySub.map(s => <div key={s.name} style={{ background: "#FEE2E2", borderRadius: 4, padding: "4px 10px", fontSize: 11, fontWeight: 600, color: "#991B1B" }}>{s.name}: {s.score}</div>)}
              </div>
            </div>
          </Card>

          <Card title="Strait of Hormuz Ship Transits (daily)" sub="Near-zero transits confirm effective closure of the world's most critical oil chokepoint." src="HormuzTracker (AISstream.io)" date={d.lastUpdate}>
            <ResponsiveContainer width="100%" height={200}>
              <BarChart data={data.transitData} margin={{ top: 5, right: 5, bottom: 5, left: -10 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" /><XAxis dataKey="date" tick={{ fontSize: 10 }} interval={3} /><YAxis tick={{ fontSize: 10 }} />
                <Tooltip content={<Tip suf=" ships" />} />
                <ReferenceLine y={b.hormuzTransits} stroke={C.grn} strokeDasharray="5 5" label={{ value: `Normal: ${b.hormuzTransits}`, fontSize: 10, fill: C.grn }} />
                <Bar dataKey="transits" radius={[2, 2, 0, 0]}>{data.transitData.map((e, i) => <Cell key={i} fill={e.transits < 10 ? C.red : e.transits < 50 ? C.amb : C.grn} />)}</Bar>
              </BarChart>
            </ResponsiveContainer>
          </Card>

          <Card title="Brent Crude Oil Price" sub="The single most important price for Vietnam's oil import bill." src="oilpriceapi.com / HormuzTracker" date={d.lastUpdate}>
            <div style={{ fontSize: 36, fontWeight: 700, color: brent > 110 ? C.red : brent > 85 ? C.amb : C.grn }}>${brent.toFixed(2)}<span style={{ fontSize: 14, color: C.mut, fontWeight: 400 }}>/bbl</span></div>
            <div style={{ fontSize: 12, color: C.mut }}>+{((brent - b.brent) / b.brent * 100).toFixed(0)}% from pre-crisis ${b.brent} · Peak: $119.13 (Mar 9/19)</div>
          </Card>

          <Card title="WTI Crude Oil Price" sub="US benchmark; Brent–WTI gap signals Middle East-specific supply stress." src="oilpriceapi.com / HormuzTracker" date={d.lastUpdate}>
            <div style={{ fontSize: 36, fontWeight: 700, color: wti > 105 ? C.red : wti > 80 ? C.amb : C.grn }}>${wti.toFixed(2)}<span style={{ fontSize: 14, color: C.mut, fontWeight: 400 }}>/bbl</span></div>
            <div style={{ fontSize: 12, color: C.mut }}>Spread: ${(brent - wti).toFixed(2)} · WTI briefly hit $100.02 (Mar 19)</div>
          </Card>

          <Card title="EU Natural Gas (TTF)" sub="Qatar LNG disruption pushes European and Asian gas prices up sharply." src="HormuzTracker" date={d.lastUpdate}>
            <div style={{ fontSize: 36, fontWeight: 700, color: C.pri }}>${d.ttf.toFixed(2)}<span style={{ fontSize: 14, color: C.mut, fontWeight: 400 }}>/MWh</span></div>
            <div style={{ fontSize: 12, color: C.red }}>+{((d.ttf - b.ttf) / b.ttf * 100).toFixed(0)}% · EU gas up 35% in single day (Mar 19)</div>
          </Card>

          <Card title="Carrier Suspension Status" sub="All 9 major lines suspended Hormuz transit — unprecedented in modern shipping." src="HormuzTracker (carrier advisories)" date={d.lastUpdate}>
            <div style={{ maxHeight: 220, overflowY: "auto" }}>
              <table style={{ width: "100%", fontSize: 12, borderCollapse: "collapse" }}>
                <thead><tr style={{ borderBottom: `1px solid ${C.bdr}` }}>
                  {["Carrier", "Status", "Trapped", "Surcharge"].map(h => <th key={h} style={{ textAlign: h === "Carrier" ? "left" : "right", padding: "4px 8px", fontSize: 10, fontWeight: 600, color: C.mut, textTransform: "uppercase" }}>{h}</th>)}
                </tr></thead>
                <tbody>{data.carriers.map(c => <tr key={c.name} style={{ borderBottom: `1px solid ${C.bdr}` }}>
                  <td style={{ padding: "6px 8px", fontWeight: 500 }}>{c.name}</td>
                  <td style={{ padding: "6px 8px", textAlign: "right" }}><span style={{ background: c.status === "Suspended" ? "#FEE2E2" : "#DCFCE7", color: c.status === "Suspended" ? "#991B1B" : "#166534", padding: "2px 8px", borderRadius: 10, fontSize: 10, fontWeight: 600 }}>{c.status}</span></td>
                  <td style={{ padding: "6px 8px", textAlign: "right" }}>{c.trapped}</td>
                  <td style={{ padding: "6px 8px", textAlign: "right", fontSize: 11, color: C.red }}>{c.surcharge}</td>
                </tr>)}</tbody>
              </table>
            </div>
          </Card>

          <Card title="Insurance Status" sub="P&I war-risk premiums 8×; coverage withdrawn for Hormuz." src="HormuzTracker (P&I clubs)" date={d.lastUpdate}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, padding: "8px 0" }}>
              {[{ l: "Premium Range", v: "0.5–2.0%+", s: "of hull value" }, { l: "VLCC Cost", v: "$2M+", s: "per transit" }, { l: "P&I Clubs Out", v: "6/6", s: "major clubs" }, { l: "Pre-Crisis", v: "0.05–0.1%", s: "8× increase" }]
                .map((x, i) => <div key={i} style={{ background: "#FFF7ED", borderRadius: 6, padding: "10px 12px" }}>
                  <div style={{ fontSize: 10, fontWeight: 600, color: "#9A3412", textTransform: "uppercase" }}>{x.l}</div>
                  <div style={{ fontSize: 20, fontWeight: 700, color: "#C2410C", marginTop: 2 }}>{x.v}</div>
                  <div style={{ fontSize: 10, color: "#EA580C" }}>{x.s}</div>
                </div>)}
            </div>
          </Card>

          <Card title="Crisis Timeline" sub="Key events since Feb 28." src="HormuzTracker + verified news" date={d.lastUpdate}>
            <div style={{ maxHeight: 260, overflowY: "auto", paddingRight: 4 }}>
              {data.timeline.map((t, i) => <div key={i} style={{ display: "flex", gap: 10, padding: "6px 0", borderBottom: i < data.timeline.length - 1 ? `1px solid ${C.bdr}` : "none" }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: C.pri, minWidth: 48, flexShrink: 0 }}>{t.date}</div>
                <div style={{ fontSize: 12, color: C.text, lineHeight: 1.4 }}>{t.event}</div>
              </div>)}
            </div>
          </Card>
        </>}

        {tab === 1 && <>
          <Card title="Brent Crude — Since Jan 2026" sub="Price trajectory from pre-crisis baseline through the shock." src="oilpriceapi.com + market data" date={d.lastUpdate}>
            <ResponsiveContainer width="100%" height={220}>
              <ComposedChart data={data.brentSeries} margin={{ top: 5, right: 5, bottom: 5, left: -10 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" /><XAxis dataKey="date" tick={{ fontSize: 10 }} interval={3} /><YAxis domain={autoDomain(data.brentSeries, "brent", 0.1, [85, 110])} tick={{ fontSize: 10 }} />
                <Tooltip content={<Tip pre="$" suf="/bbl" />} />
                <ReferenceArea y1={0} y2={85} fill={Z.g} /><ReferenceArea y1={85} y2={110} fill={Z.a} /><ReferenceArea y1={110} y2={140} fill={Z.r} />
                <ReferenceLine y={85} stroke={C.amb} strokeDasharray="5 5" /><ReferenceLine y={110} stroke={C.red} strokeDasharray="5 5" />
                <Line type="monotone" dataKey="brent" stroke={C.pri} strokeWidth={2} dot={false} name="Brent" />
              </ComposedChart>
            </ResponsiveContainer>
          </Card>

          <Card title="Brent–WTI Spread" sub="Widening = ME supply disruption not matched by US production." src="Calculated" date={d.lastUpdate}>
            <ResponsiveContainer width="100%" height={220}>
              <LineChart data={spread} margin={{ top: 5, right: 5, bottom: 5, left: -10 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" /><XAxis dataKey="date" tick={{ fontSize: 10 }} interval={3} /><YAxis tick={{ fontSize: 10 }} />
                <Tooltip content={<Tip pre="$" />} /><Line type="monotone" dataKey="spread" stroke="#7C3AED" strokeWidth={2} dot={false} name="Spread" />
              </LineChart>
            </ResponsiveContainer>
          </Card>

          <Card title="US Natural Gas" sub="Henry Hub; transmission channel for global LNG disruption." src="Market data" date={d.lastUpdate}>
            <ResponsiveContainer width="100%" height={200}>
              <LineChart data={data.gmGas} margin={{ top: 5, right: 5, bottom: 5, left: -10 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" /><XAxis dataKey="date" tick={{ fontSize: 10 }} /><YAxis tick={{ fontSize: 10 }} domain={autoDomain(data.gmGas, "value")} />
                <Tooltip content={<Tip pre="$" suf="/MMBtu" />} /><Line type="monotone" dataKey="value" stroke={C.pri} strokeWidth={2} dot={{ r: 3 }} name="Nat Gas" />
              </LineChart>
            </ResponsiveContainer>
          </Card>

          <Card title="VIX (Volatility Index)" sub="Equity fear gauge; sustained elevation signals uncertainty beyond energy." src="CBOE" date={d.lastUpdate}>
            <ResponsiveContainer width="100%" height={200}>
              <ComposedChart data={data.gmVix} margin={{ top: 5, right: 5, bottom: 5, left: -10 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" /><XAxis dataKey="date" tick={{ fontSize: 10 }} /><YAxis tick={{ fontSize: 10 }} domain={autoDomain(data.gmVix, "value", 0.15, [20, 30])} />
                <Tooltip content={<Tip />} />
                <ReferenceArea y1={0} y2={20} fill={Z.g} /><ReferenceArea y1={20} y2={30} fill={Z.a} /><ReferenceArea y1={30} y2={50} fill={Z.r} />
                <ReferenceLine y={20} stroke={C.amb} strokeDasharray="5 5" /><ReferenceLine y={30} stroke={C.red} strokeDasharray="5 5" />
                <Line type="monotone" dataKey="value" stroke={C.pri} strokeWidth={2} dot={{ r: 3 }} name="VIX" />
              </ComposedChart>
            </ResponsiveContainer>
          </Card>

          <Card title="Gold Price" sub="Safe-haven demand; rising gold + oil = deep risk aversion." src="Market data" date={d.lastUpdate}>
            <ResponsiveContainer width="100%" height={200}>
              <LineChart data={data.gmGold} margin={{ top: 5, right: 5, bottom: 5, left: 5 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" /><XAxis dataKey="date" tick={{ fontSize: 10 }} /><YAxis tick={{ fontSize: 10 }} domain={autoDomain(data.gmGold, "value")} />
                <Tooltip content={<Tip pre="$" suf="/oz" />} /><Line type="monotone" dataKey="value" stroke="#D97706" strokeWidth={2} dot={{ r: 3 }} name="Gold" />
              </LineChart>
            </ResponsiveContainer>
          </Card>

          <Card title="Global Supply Chain Pressure" sub="Composite measure of shipping/logistics bottlenecks." src="Est. NY Fed GSCPI" date={d.lastUpdate}>
            <ResponsiveContainer width="100%" height={200}>
              <BarChart data={data.gmGscpi} margin={{ top: 5, right: 5, bottom: 5, left: -10 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" /><XAxis dataKey="date" tick={{ fontSize: 10 }} /><YAxis tick={{ fontSize: 10 }} />
                <Tooltip content={<Tip suf=" σ" />} />
                <Bar dataKey="value" radius={[4, 4, 0, 0]} name="GSCPI">{data.gmGscpi.map((e, i) => <Cell key={i} fill={e.value > 2 ? C.red : e.value > 1 ? C.amb : C.pri} />)}</Bar>
              </BarChart>
            </ResponsiveContainer>
          </Card>
        </>}

        {tab === 2 && <>
          <Card title="RON95 Gasoline (VND/litre)" sub="Surged 52% since crisis. Govt using Price Stabilization Fund (3k VND/L subsidy)." src="MOIT / Petrolimex" date="Mar 19 adjustment">
            <ResponsiveContainer width="100%" height={200}>
              <ComposedChart data={data.vnFuel} margin={{ top: 5, right: 5, bottom: 5, left: -5 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" /><XAxis dataKey="date" tick={{ fontSize: 10 }} /><YAxis tick={{ fontSize: 10 }} domain={autoDomain(data.vnFuel, "ron95", 0.1, [25000, 30000])} tickFormatter={v => `${(v/1000).toFixed(0)}k`} />
                <Tooltip content={<Tip suf=" VND/L" />} />
                <ReferenceArea y1={0} y2={25000} fill={Z.g} /><ReferenceArea y1={25000} y2={30000} fill={Z.a} /><ReferenceArea y1={30000} y2={40000} fill={Z.r} />
                <ReferenceLine y={25000} stroke={C.amb} strokeDasharray="5 5" /><ReferenceLine y={30000} stroke={C.red} strokeDasharray="5 5" />
                <Line type="monotone" dataKey="ron95" stroke={C.pri} strokeWidth={2} dot={{ r: 3 }} name="RON95" />
              </ComposedChart>
            </ResponsiveContainer>
          </Card>

          <Card title="Diesel Price (VND/litre)" sub="Up 73% since crisis — drives logistics, agriculture, manufacturing costs." src="MOIT / Petrolimex" date="Mar 19 adjustment">
            <ResponsiveContainer width="100%" height={200}>
              <ComposedChart data={data.vnFuel} margin={{ top: 5, right: 5, bottom: 5, left: -5 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" /><XAxis dataKey="date" tick={{ fontSize: 10 }} /><YAxis tick={{ fontSize: 10 }} domain={autoDomain(data.vnFuel, "diesel", 0.1, [25000, 33000])} tickFormatter={v => `${(v/1000).toFixed(0)}k`} />
                <Tooltip content={<Tip suf=" VND/L" />} />
                <ReferenceArea y1={0} y2={25000} fill={Z.g} /><ReferenceArea y1={25000} y2={33000} fill={Z.a} /><ReferenceArea y1={33000} y2={42000} fill={Z.r} />
                <ReferenceLine y={25000} stroke={C.amb} strokeDasharray="5 5" /><ReferenceLine y={33000} stroke={C.red} strokeDasharray="5 5" />
                <Line type="monotone" dataKey="diesel" stroke="#0891B2" strokeWidth={2} dot={{ r: 3 }} name="Diesel" />
              </ComposedChart>
            </ResponsiveContainer>
          </Card>

          <Card title="USD/VND Exchange Rate" sub="Official 26,309; free market surged to 27,080. SBV central rate: 25,072." src="SBV / TradingEconomics" date={d.lastUpdate}>
            <ResponsiveContainer width="100%" height={200}>
              <ComposedChart data={data.vnUsdvnd} margin={{ top: 5, right: 5, bottom: 5, left: 5 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" /><XAxis dataKey="date" tick={{ fontSize: 10 }} /><YAxis tick={{ fontSize: 10 }} domain={autoDomain(data.vnUsdvnd, ["value", "free"], 0.1, [26500, 27000])} />
                <Tooltip content={<Tip />} />
                <ReferenceArea y1={0} y2={26500} fill={Z.g} /><ReferenceArea y1={26500} y2={27000} fill={Z.a} /><ReferenceArea y1={27000} y2={28000} fill={Z.r} />
                <ReferenceLine y={26500} stroke={C.amb} strokeDasharray="5 5" /><ReferenceLine y={27000} stroke={C.red} strokeDasharray="5 5" />
                <Line type="monotone" dataKey="value" stroke={C.pri} strokeWidth={2} dot={{ r: 3 }} name="Official" />
                <Line type="monotone" dataKey="free" stroke={C.red} strokeWidth={1.5} dot={{ r: 2 }} name="Free Mkt" strokeDasharray="4 2" />
              </ComposedChart>
            </ResponsiveContainer>
          </Card>

          <Card title="VN-Index" sub="Fell from ~1,900 to 1,699 (−10.6%) before rebounding to 1,813." src="HoSE / TradingEconomics" date={d.lastUpdate}>
            <ResponsiveContainer width="100%" height={200}>
              <ComposedChart data={data.vnIndex} margin={{ top: 5, right: 5, bottom: 5, left: -5 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" /><XAxis dataKey="date" tick={{ fontSize: 10 }} /><YAxis tick={{ fontSize: 10 }} domain={autoDomain(data.vnIndex, "value", 0.1, [b.vnindex * 0.85, b.vnindex])} />
                <Tooltip content={<Tip />} />
                <ReferenceLine y={b.vnindex * .95} stroke={C.amb} strokeDasharray="5 5" label={{ value: "-5%", fontSize: 10 }} />
                <ReferenceLine y={b.vnindex * .85} stroke={C.red} strokeDasharray="5 5" label={{ value: "-15%", fontSize: 10 }} />
                <Line type="monotone" dataKey="value" stroke={C.red} strokeWidth={2} dot={{ r: 3 }} name="VN-Index" />
              </ComposedChart>
            </ResponsiveContainer>
          </Card>

          <Card title="Vietnam CPI (y/y %)" sub="Feb 2026: 3.35%. Oil pass-through arrives with 2–3 month lag — worst ahead." src="GSO / TradingEconomics" date="Feb 2026 release">
            <ResponsiveContainer width="100%" height={200}>
              <ComposedChart data={data.vnCpi} margin={{ top: 5, right: 5, bottom: 5, left: -10 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" /><XAxis dataKey="month" tick={{ fontSize: 10 }} /><YAxis tick={{ fontSize: 10 }} domain={[0, autoDomain(data.vnCpi, "value", 0.2, [4, 5])[1]]} />
                <Tooltip content={<Tip suf="%" />} />
                <ReferenceArea y1={0} y2={4} fill={Z.g} /><ReferenceArea y1={4} y2={5} fill={Z.a} /><ReferenceArea y1={5} y2={7} fill={Z.r} />
                <ReferenceLine y={4} stroke={C.amb} strokeDasharray="5 5" /><ReferenceLine y={5} stroke={C.red} strokeDasharray="5 5" />
                <Bar dataKey="value" radius={[4, 4, 0, 0]} name="CPI">{data.vnCpi.map((e, i) => <Cell key={i} fill={e.value > 5 ? C.red : e.value > 4 ? C.amb : C.pri} />)}</Bar>
              </ComposedChart>
            </ResponsiveContainer>
          </Card>

          <Card title="FX Reserves (USD bn)" sub="Buffer to defend VND. SBV sold est. $1.2bn in March." src="SBV / IMF" date={d.lastUpdate}>
            <ResponsiveContainer width="100%" height={200}>
              <BarChart data={data.vnFxReserves} margin={{ top: 5, right: 5, bottom: 5, left: -10 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" /><XAxis dataKey="quarter" tick={{ fontSize: 10 }} /><YAxis tick={{ fontSize: 10 }} domain={autoDomain(data.vnFxReserves, "value")} />
                <Tooltip content={<Tip pre="$" suf="bn" />} /><Bar dataKey="value" fill={C.pri} radius={[4, 4, 0, 0]} name="Reserves" />
              </BarChart>
            </ResponsiveContainer>
          </Card>

          <Card title="Oil Import Dependency — Regional" sub="Vietnam at 37% — less exposed than most ASEAN peers except Indonesia." src="IEA / World Bank" date="2025 est.">
            <ResponsiveContainer width="100%" height={200}>
              <BarChart data={data.oilDependency} layout="vertical" margin={{ top: 5, right: 20, bottom: 5, left: 20 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" horizontal={false} />
                <XAxis type="number" tick={{ fontSize: 10 }} domain={[0, autoDomain(data.oilDependency, "pct", 0.15)[1]]} unit="%" />
                <YAxis type="category" dataKey="country" tick={{ fontSize: 11 }} width={80} />
                <Tooltip content={<Tip suf="%" />} />
                <Bar dataKey="pct" radius={[0, 4, 4, 0]} name="Import %">{data.oilDependency.map((e, i) => <Cell key={i} fill={e.country === "Vietnam" ? C.pri : C.sec} />)}</Bar>
              </BarChart>
            </ResponsiveContainer>
          </Card>

          <Card title="Strategic Petroleum Reserve (days)" sub="At 18 days, Vietnam has one of Asia's thinnest buffers — IEA standard is 90." src="MOIT / IEA" date="2025 est.">
            <ResponsiveContainer width="100%" height={200}>
              <BarChart data={data.sprData} layout="vertical" margin={{ top: 5, right: 20, bottom: 5, left: 20 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" horizontal={false} />
                <XAxis type="number" tick={{ fontSize: 10 }} domain={[0, autoDomain(data.sprData, "days", 0.15, [90])[1]]} unit="d" />
                <YAxis type="category" dataKey="name" tick={{ fontSize: 11 }} width={70} />
                <Tooltip content={<Tip suf=" days" />} />
                <ReferenceLine x={90} stroke={C.amb} strokeDasharray="5 5" /><ReferenceLine x={30} stroke={C.red} strokeDasharray="5 5" />
                <Bar dataKey="days" radius={[0, 4, 4, 0]} name="SPR">{data.sprData.map((e, i) => <Cell key={i} fill={e.days < 30 ? C.red : e.days < 60 ? C.amb : C.grn} />)}</Bar>
              </BarChart>
            </ResponsiveContainer>
          </Card>
        </>}

        </div>
      </div>

      {/* FOOTER */}
      <div style={{ borderTop: `1px solid ${C.bdr}`, padding: "16px 24px", maxWidth: 1200, margin: "0 auto", fontSize: 11, color: C.mut }}>
        <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
          <div>Data: <a href="https://hormuztracker.com" target="_blank" rel="noopener noreferrer" style={{ color: C.pri, textDecoration: "none" }}>HormuzTracker.com</a> (CC BY 4.0) · oilpriceapi.com · MOIT · Petrolimex · SBV · GSO · HoSE · CBOE · IEA</div>
          <div>Verified data as of {d.lastUpdate}</div>
        </div>
        <div style={{ display: "flex", gap: 14, marginTop: 8, flexWrap: "wrap" }}>
          {[["Normal", C.grn], ["Elevated", C.amb], ["Critical", C.red]].map(([l, c]) => (
            <span key={l} style={{ display: "flex", alignItems: "center", gap: 4 }}>
              <span style={{ width: 10, height: 10, borderRadius: 2, background: c, display: "inline-block" }} /> {l}
            </span>
          ))}
        </div>
      </div>
    </div>
  );
}

    // ─── RENDER ────────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
